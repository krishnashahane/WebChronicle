<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebChronicle — Website Design Evolution</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- Hero Section -->
    <header class="hero">
      <div class="hero-bg"></div>
      <div class="hero-content">
        <h1 class="logo">
          <span class="logo-icon">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
              <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="2"/>
              <path d="M20 4C20 4 8 14 8 22C8 28.627 13.373 34 20 34C26.627 34 32 28.627 32 22C32 14 20 4 20 4Z" fill="currentColor" opacity="0.15"/>
              <circle cx="20" cy="20" r="6" stroke="currentColor" stroke-width="2"/>
              <line x1="20" y1="2" x2="20" y2="8" stroke="currentColor" stroke-width="2"/>
              <line x1="20" y1="32" x2="20" y2="38" stroke="currentColor" stroke-width="2"/>
              <line x1="2" y1="20" x2="8" y2="20" stroke="currentColor" stroke-width="2"/>
              <line x1="32" y1="20" x2="38" y2="20" stroke="currentColor" stroke-width="2"/>
            </svg>
          </span>
          WebChronicle
        </h1>
        <p class="tagline">Explore how any website's design evolved over the years</p>

        <form id="search-form" class="search-box" autocomplete="off">
          <div class="input-wrapper">
            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input
              type="text"
              id="url-input"
              placeholder="Enter a website URL (e.g., apple.com)"
              spellcheck="false"
            />
            <button type="submit" id="search-btn">
              <span class="btn-text">Explore</span>
              <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </button>
          </div>
          <div class="quick-links">
            <span>Try:</span>
            <button type="button" class="quick-link" data-url="google.com">Google</button>
            <button type="button" class="quick-link" data-url="apple.com">Apple</button>
            <button type="button" class="quick-link" data-url="amazon.com">Amazon</button>
            <button type="button" class="quick-link" data-url="nytimes.com">NY Times</button>
            <button type="button" class="quick-link" data-url="wikipedia.org">Wikipedia</button>
          </div>
        </form>
      </div>
    </header>

    <!-- Loading State -->
    <div id="loading" class="loading hidden">
      <div class="loading-spinner">
        <div class="spinner-ring"></div>
        <div class="spinner-ring"></div>
        <div class="spinner-ring"></div>
      </div>
      <p class="loading-text">Traveling through time...</p>
      <p class="loading-subtext">Fetching archived snapshots from the Wayback Machine</p>
    </div>

    <!-- Error State -->
    <div id="error" class="error-state hidden">
      <div class="error-icon">!</div>
      <p class="error-message"></p>
      <button id="retry-btn" class="retry-btn">Try Again</button>
    </div>

    <!-- Results -->
    <div id="results" class="results hidden">
      <div class="results-header">
        <h2 id="results-title"></h2>
        <p id="results-subtitle"></p>
      </div>

      <!-- Timeline -->
      <div class="timeline-container">
        <div class="timeline-track">
          <div class="timeline-line"></div>
          <div id="timeline-markers" class="timeline-markers"></div>
        </div>
      </div>

      <!-- Snapshot Cards Grid -->
      <div id="snapshots-grid" class="snapshots-grid"></div>

      <!-- Full Preview Modal -->
      <div id="preview-modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
          <div class="modal-header">
            <div class="modal-title">
              <h3 id="modal-year"></h3>
              <span id="modal-date"></span>
            </div>
            <div class="modal-actions">
              <a id="modal-external-link" href="#" target="_blank" rel="noopener noreferrer" class="modal-btn">
                Open in Wayback Machine
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                  <polyline points="15 3 21 3 21 9"/>
                  <line x1="10" y1="14" x2="21" y2="3"/>
                </svg>
              </a>
              <button id="modal-close" class="modal-close">&times;</button>
            </div>
          </div>
          <div class="modal-body">
            <iframe id="modal-iframe" sandbox="allow-same-origin allow-scripts"></iframe>
          </div>
          <div class="modal-nav">
            <button id="nav-prev" class="nav-btn">&larr; Previous</button>
            <button id="nav-next" class="nav-btn">Next &rarr;</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
